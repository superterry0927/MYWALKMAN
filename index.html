<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的主題曲</title>
    <style>
        /* =========================================
           視覺設計 (CSS) - 滿版手機介面優化
           ========================================= */
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #1a1a1a; 
            margin: 0; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden; /* 防止整個網頁上下滑動 */
        }
        
        .walkman-body { 
            background: linear-gradient(145deg, #e6e6e6, #c0c0c0); 
            width: 90vw; 
            max-width: 450px; 
            height: 90vh; 
            max-height: 850px;
            padding: 25px 20px; 
            border-radius: 25px; 
            box-shadow: 10px 10px 30px rgba(0,0,0,0.8), inset -2px -2px 6px #999, inset 2px 2px 6px #fff; 
            border: 2px solid #a3a3a3; 
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .brand-text {
            text-align: center;
            font-size: 16px;
            font-weight: 900;
            color: #444;
            margin-bottom: 20px;
            letter-spacing: 3px;
        }
        
        .tape-window { 
            background-color: #111; 
            flex: 0 0 40%; 
            border-radius: 15px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            border: 4px solid #333; 
            box-shadow: inset 0 0 25px #000; 
            position: relative;
        }

        .loading-text {
            position: absolute;
            color: #888;
            font-size: 14px;
            z-index: 1;
            text-align: center;
        }
        
        .cover-art { 
            width: 200px; 
            height: 200px; 
            border-radius: 50%; 
            object-fit: cover; 
            animation: spin 5s linear infinite; 
            animation-play-state: paused; 
            z-index: 2;
            display: none; 
            border: 4px solid #222;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            background-color: #222;
        }

        /* 歌詞容器區塊 (升級為原生捲動) */
        .lyrics-wrapper {
            flex: 1; 
            margin: 20px 0;
            background-color: rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.1);
            overflow-y: auto; /* 開啟原生滑動功能 */
            position: relative;
            /* 讓上下邊緣有漸層消失的效果 */
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
            /* 隱藏預設的醜醜捲軸 */
            -ms-overflow-style: none;  
            scrollbar-width: none;  
        }
        .lyrics-wrapper::-webkit-scrollbar { 
            display: none; 
        }

        .lyrics-container {
            width: 100%;
            text-align: center;
            /* 首尾加上大量空白，讓第一句和最後一句都能滑到畫面正中央 */
            padding: 40vh 0; 
        }

        .lyric-line {
            padding: 12px 15px;
            font-size: 16px; /* 統一字體大小 */
            color: #666;
            transition: color 0.3s ease, text-shadow 0.3s ease; 
            min-height: 20px;
        }

        /* 正在播放的高亮歌詞 (一般深藍色，無發光) */
        .lyric-line.active {
            color: #003399; /* 改為沈穩的深藍色 */
            font-weight: bold;
            text-shadow: none; /* 移除 KTV 霓虹發光感 */
        }
        
        .controls { 
            display: flex; 
            justify-content: space-between; 
            padding: 0 5px;
            margin-top: auto; 
        }
        
        button { 
            width: 46%; 
            height: 60px; 
            border-radius: 10px; 
            border: none; 
            font-weight: 900; 
            font-size: 18px;
            letter-spacing: 2px;
            cursor: pointer; 
            box-shadow: 0px 6px 0px #888, 2px 8px 12px rgba(0,0,0,0.3); 
            transition: transform 0.1s, box-shadow 0.1s; 
            outline: none;
        }
        
        button:active:not(:disabled) { 
            transform: translateY(6px); 
            box-shadow: 0px 0px 0px #888, 1px 3px 5px rgba(0,0,0,0.3); 
        }

        button:disabled {
            background-color: #999 !important;
            color: #ccc;
            cursor: not-allowed;
            box-shadow: 0px 6px 0px #666;
        }
        
        #play-btn { background-color: #ff471a; color: white; }
        #stop-btn { background-color: #555; color: white; }
        
        @keyframes spin { 
            100% { transform: rotate(360deg); } 
        }

        #error-msg {
            color: #ff471a;
            text-align: center;
            font-size: 14px;
            margin-top: 15px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div class="walkman-body">
        <div class="brand-text">我的主題曲</div>
        
        <div class="tape-window">
            <div class="loading-text" id="status-text">載入中...</div>
            <img src="" alt="Cover Art" class="cover-art" id="cover">
        </div>

        <!-- 動態歌詞顯示區 -->
        <div class="lyrics-wrapper" id="lyrics-wrapper">
            <div class="lyrics-container" id="lyrics-container">
                <!-- 歌詞會動態生成在這裡 -->
            </div>
        </div>
        
        <div class="controls">
            <audio id="audio-player" preload="auto"></audio>
            
            <button id="play-btn" disabled>PLAY</button>
            <button id="stop-btn" disabled>STOP</button>
        </div>

        <div id="error-msg">找不到對應的資料。</div>
    </div>

    <script>
        /* =========================================
           資料設定區 (資料庫)
           ========================================= */
        const mediaDatabase = {
            // 【第 1 組資料】(網址輸入 ?id=1 時讀取)
            "1": {
                coverUrl: "cover1.png", 
                audioUrl: "music1.mp3",
                lrc: `
[00:16.88]校園裡笛聲悠揚　吹奏著畢業的樂章
[00:24.68]背起相機走進故鄉　紀錄那最美的光芒
[00:32.68]你是天資聰穎的少年　談吐間充滿自信力量
[00:40.58]廖彥軍　向著夢想出發吧
[00:43.99]在那寬廣舞台　你要盡情散發光華
[00:48.07]像璀璨星辰　在那高處發熱發亮
[00:52.10]未來的路　由你親手去勾勒畫像
[00:56.80]活潑有禮　口才流利　大家都為你著迷
[01:00.58]智慧是你的羽翼　讓你飛得更高更有力
[01:04.83]但記得言語要得體　溫柔體察那每分情誼
[01:12.32]更上一層樓　莫忘初衷那份純真
[01:20.33]在成長的路上　打磨出最閃耀的靈魂
[01:26.58]清脆笛音在迴盪　少年志氣比天長
[01:30.86]去吧彥軍　去寫下屬於你的輝煌
                `
            },
            // 【第 2 組資料】(網址輸入 ?id=2 時讀取)
            // 注意：第 1 組的結尾大括號後面一定要加上逗號「,」
            "2": {
                // 上傳 GitHub 後，這裡可換成 "cover2.jpg"
                coverUrl: "https://picsum.photos/400/400?random=2", 
                // 上傳 GitHub 後，這裡可換成 "music2.mp3"
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", 
                lrc: `
[00:00.00] 準備播放：第二首主題曲
[00:05.00] 恭喜你！成功新增了第二首歌
[00:10.00] 只要你的網址後面加上 ?id=2
[00:15.00] 系統就會自動切換到這裡的音樂和圖片
[00:20.00] 趕快製作下一張 NFC 卡片吧！
                `
            }
        };

        /* =========================================
           互動邏輯區
           ========================================= */
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id') || '1'; 

            const audio = document.getElementById('audio-player');
            const cover = document.getElementById('cover');
            const playBtn = document.getElementById('play-btn');
            const stopBtn = document.getElementById('stop-btn');
            const statusText = document.getElementById('status-text');
            const lyricsContainer = document.getElementById('lyrics-container');
            const lyricsWrapper = document.getElementById('lyrics-wrapper');

            let isAudioLoaded = false;
            let parsedLyrics = []; 
            let currentLyricIndex = -1; 
            let hasAttemptedAutoplay = false; // 防止重複觸發自動播放
            
            // 互動偵測變數 (判斷使用者是否正在手動滑歌詞)
            let isUserInteracting = false;
            let interactionTimeout;

            // 1. 解析 LRC
            function parseLRC(lrcString) {
                const lines = lrcString.split('\n');
                const result = [];
                const timeReg = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
                
                for (let line of lines) {
                    const match = line.match(timeReg);
                    if (match) {
                        const min = parseInt(match[1]);
                        const sec = parseInt(match[2]);
                        const ms = parseInt(match[3].padEnd(3, '0')); 
                        const time = min * 60 + sec + ms / 1000;
                        const text = line.replace(timeReg, '').trim();
                        if (text) {
                            result.push({ time: time, text: text });
                        }
                    }
                }
                return result;
            }

            // 2. 渲染歌詞
            function renderLyrics(lyrics) {
                lyricsContainer.innerHTML = ''; 
                lyrics.forEach((lyric, index) => {
                    const div = document.createElement('div');
                    div.className = 'lyric-line';
                    div.id = `lyric-${index}`;
                    div.innerText = lyric.text;
                    lyricsContainer.appendChild(div);
                });
            }

            // 【嘗試自動播放的核心函數】
            function attemptAutoplay() {
                if (hasAttemptedAutoplay) return;
                hasAttemptedAutoplay = true;

                audio.play().then(() => {
                    // 自動播放成功！
                    cover.style.animationPlayState = 'running';
                    statusText.style.display = 'none';
                    console.log("瀏覽器允許自動播放，音樂已啟動！");
                }).catch(error => {
                    // 自動播放被阻擋
                    console.warn("瀏覽器阻擋了自動播放，需等待使用者點擊：", error);
                    statusText.innerText = "請點擊 PLAY 播放";
                    statusText.style.display = 'block';
                });
            }

            // 3. 資料載入與檢查
            if (mediaDatabase[userId] && mediaDatabase[userId].audioUrl !== "") {
                const userData = mediaDatabase[userId];
                cover.src = userData.coverUrl;
                audio.src = userData.audioUrl;

                if (userData.lrc) {
                    parsedLyrics = parseLRC(userData.lrc);
                    renderLyrics(parsedLyrics);
                } else {
                    lyricsContainer.innerHTML = '<div class="lyric-line">無歌詞資料</div>';
                }

                // 圖片載入完成
                cover.onload = () => {
                    cover.style.display = 'block';
                    if (!hasAttemptedAutoplay) {
                        statusText.style.display = 'none';
                    }
                    if(isAudioLoaded) {
                        playBtn.disabled = false;
                        stopBtn.disabled = false;
                        attemptAutoplay(); 
                    }
                };

                // 音樂載入至可播放狀態
                audio.oncanplay = () => {
                    if (!isAudioLoaded) {
                        isAudioLoaded = true;
                        if (cover.style.display === 'block') {
                            playBtn.disabled = false;
                            stopBtn.disabled = false;
                            attemptAutoplay(); 
                        }
                    }
                };
            }

            // --- 核心：滑動歌詞來快轉/倒轉的邏輯 ---

            // 設定使用者正在互動的狀態
            function setInteracting() {
                isUserInteracting = true;
                clearTimeout(interactionTimeout);
            }

            // 解除互動狀態，延遲一下讓系統接手自動捲動
            function clearInteracting() {
                interactionTimeout = setTimeout(() => {
                    isUserInteracting = false;
                }, 1000); 
            }

            // 監聽各種觸控與滑鼠事件
            lyricsWrapper.addEventListener('touchstart', setInteracting, {passive: true});
            lyricsWrapper.addEventListener('touchmove', setInteracting, {passive: true});
            lyricsWrapper.addEventListener('touchend', clearInteracting);
            lyricsWrapper.addEventListener('mousedown', setInteracting);
            window.addEventListener('mouseup', () => { if(isUserInteracting) clearInteracting(); });
            lyricsWrapper.addEventListener('wheel', () => {
                setInteracting();
                clearInteracting();
            }, {passive: true});

            // 當歌詞容器被滑動時...
            let lastScrubTime = 0;
            lyricsWrapper.addEventListener('scroll', () => {
                if (!isUserInteracting || parsedLyrics.length === 0 || !isAudioLoaded) return;

                const wrapperCenter = lyricsWrapper.scrollTop + lyricsWrapper.clientHeight / 2;
                let closestIndex = 0;
                let minDistance = Infinity;

                const lyricElements = document.querySelectorAll('.lyric-line');
                lyricElements.forEach((el, index) => {
                    const elCenter = el.offsetTop + el.clientHeight / 2;
                    const distance = Math.abs(wrapperCenter - elCenter);
                    if (distance < minDistance) {
                        minDistance = distance;
                        closestIndex = index;
                    }
                });

                if (currentLyricIndex !== closestIndex) {
                    if (currentLyricIndex !== -1) {
                        const oldElement = document.getElementById(`lyric-${currentLyricIndex}`);
                        if (oldElement) oldElement.classList.remove('active');
                    }
                    const newElement = document.getElementById(`lyric-${closestIndex}`);
                    if (newElement) newElement.classList.add('active');
                    currentLyricIndex = closestIndex;
                    
                    const now = Date.now();
                    if (now - lastScrubTime > 50) { 
                        audio.currentTime = parsedLyrics[closestIndex].time;
                        lastScrubTime = now;
                    }
                }
            });

            // --- 系統自動時間更新 ---
            audio.addEventListener('timeupdate', () => {
                if (parsedLyrics.length === 0) return;
                
                const currentTime = audio.currentTime;
                let newIndex = parsedLyrics.findIndex((lyric, index) => {
                    const nextTime = parsedLyrics[index + 1] ? parsedLyrics[index + 1].time : Infinity;
                    return currentTime >= lyric.time && currentTime < nextTime;
                });

                if (newIndex !== -1 && newIndex !== currentLyricIndex) {
                    if (currentLyricIndex !== -1) {
                        const oldElement = document.getElementById(`lyric-${currentLyricIndex}`);
                        if (oldElement) oldElement.classList.remove('active');
                    }
                    
                    const newElement = document.getElementById(`lyric-${newIndex}`);
                    if (newElement) {
                        newElement.classList.add('active');
                        
                        if (!isUserInteracting) {
                            const targetScroll = newElement.offsetTop - lyricsWrapper.clientHeight / 2 + newElement.clientHeight / 2;
                            lyricsWrapper.scrollTo({
                                top: targetScroll,
                                behavior: 'smooth'
                            });
                        }
                    }
                    currentLyricIndex = newIndex;
                }
            });

            playBtn.addEventListener('click', () => {
                audio.play().then(() => {
                    cover.style.animationPlayState = 'running';
                    statusText.style.display = 'none';
                }).catch(error => console.log(error));
            });

            stopBtn.addEventListener('click', () => {
                audio.pause();
                cover.style.animationPlayState = 'paused';
            });
            
            audio.addEventListener('ended', () => {
                cover.style.animationPlayState = 'paused';
            });
        });
    </script>
</body>
</html>
