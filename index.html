<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專屬隨身聽</title>
    <style>
        /* =========================================
           視覺設計 (CSS) 
           ========================================= */
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #2b2b2b; 
            margin: 0; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            user-select: none;
            -webkit-user-select: none;
        }
        
        .walkman-body { 
            background: linear-gradient(145deg, #e6e6e6, #c0c0c0); 
            width: 320px; 
            padding: 30px 20px; 
            border-radius: 20px; 
            box-shadow: 10px 10px 20px #1a1a1a, inset -2px -2px 6px #999, inset 2px 2px 6px #fff; 
            border: 2px solid #a3a3a3; 
        }

        .brand-text {
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: #555;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        
        .tape-window { 
            background-color: #111; 
            height: 180px; 
            border-radius: 12px; 
            margin-bottom: 30px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            border: 4px solid #444; 
            box-shadow: inset 0 0 15px #000; 
            position: relative;
        }

        .loading-text {
            position: absolute;
            color: #888;
            font-size: 14px;
            z-index: 1;
            text-align: center;
        }
        
        .cover-art { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            object-fit: cover; 
            animation: spin 4s linear infinite; 
            animation-play-state: paused; 
            z-index: 2;
            display: none; 
            border: 2px solid #333;
            background-color: #222;
        }
        
        .controls { 
            display: flex; 
            justify-content: space-between; 
            padding: 0 10px;
        }
        
        button { 
            width: 45%; 
            height: 50px; 
            border-radius: 8px; 
            border: none; 
            font-weight: 900; 
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer; 
            box-shadow: 0px 5px 0px #888, 2px 8px 10px rgba(0,0,0,0.3); 
            transition: transform 0.1s, box-shadow 0.1s; 
            outline: none;
        }
        
        button:active:not(:disabled) { 
            transform: translateY(5px); 
            box-shadow: 0px 0px 0px #888, 1px 3px 5px rgba(0,0,0,0.3); 
        }

        button:disabled {
            background-color: #999 !important;
            color: #ccc;
            cursor: not-allowed;
            box-shadow: 0px 5px 0px #666;
        }
        
        #play-btn { background-color: #ff471a; color: white; }
        #stop-btn { background-color: #555; color: white; }
        
        @keyframes spin { 
            100% { transform: rotate(360deg); } 
        }

        #error-msg {
            color: #ff471a;
            text-align: center;
            font-size: 14px;
            margin-top: 20px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div class="walkman-body">
        <div class="brand-text">STEREO CASSETTE PLAYER</div>
        
        <div class="tape-window">
            <div class="loading-text" id="status-text">載入中...</div>
            <img src="" alt="Cover Art" class="cover-art" id="cover">
        </div>
        
        <div class="controls">
            <audio id="audio-player" preload="auto"></audio>
            
            <button id="play-btn" disabled>PLAY</button>
            <button id="stop-btn" disabled>STOP</button>
        </div>

        <div id="error-msg">找不到對應的資料。</div>
    </div>

    <script>
        /* =========================================
           資料設定區
           ========================================= */
        const mediaDatabase = {
            "1": {
                // 【注意】為了讓你在這裡能預覽成功，我暫時換成了網路圖片與音樂。
                // 當你要把這些檔案上傳到 GitHub 時，請把引號裡面的字改回 "cover1.jpg" 與 "music1.mp3"！
                coverUrl: "cover1.jpg", 
                audioUrl: "music1.mp3"   
            },
            "2": {
                // 上傳 GitHub 時請改回 "cover2.jpg"
                coverUrl: "https://picsum.photos/300/300?random=2", 
                // 上傳 GitHub 時請改回 "music2.mp3"
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"   
            },
            "3": {
                coverUrl: "cover3.jpg", 
                audioUrl: "music3.mp3"
            }
        };

        /* =========================================
           互動邏輯區 (無需修改)
           ========================================= */
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id') || '1'; 

            const audio = document.getElementById('audio-player');
            const cover = document.getElementById('cover');
            const playBtn = document.getElementById('play-btn');
            const stopBtn = document.getElementById('stop-btn');
            const statusText = document.getElementById('status-text');
            const errorMsg = document.getElementById('error-msg');

            // 判斷音效檔是否成功載入的旗標
            let isAudioLoaded = true;

            if (mediaDatabase[userId] && mediaDatabase[userId].audioUrl !== "") {
                const userData = mediaDatabase[userId];
                
                cover.src = userData.coverUrl;
                audio.src = userData.audioUrl;

                // 圖片載入成功
                cover.onload = () => {
                    cover.style.display = 'block';
                    statusText.style.display = 'none';
                    if(isAudioLoaded) {
                        playBtn.disabled = false;
                        stopBtn.disabled = false;
                    }
                };

                // 【修正：圖片載入失敗的防護】
                cover.onerror = () => {
                    console.error("圖片載入失敗！如果你在預覽區看到這個錯誤，是因為檔案還沒上傳到 GitHub。");
                    cover.onerror = null; // 防止無限迴圈
                    cover.src = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='120' height='120' viewBox='0 0 120 120'%3E%3Crect fill='%23333' width='120' height='120'/%3E%3Ctext fill='%23888' font-family='sans-serif' font-size='14' dy='5' font-weight='bold' x='50%25' y='50%25' text-anchor='middle'%3ENo Cover%3C/text%3E%3C/svg%3E"; // 顯示備用灰色圓圈
                    cover.style.display = 'block';
                    statusText.style.display = 'none';
                };

                // 【修正：音訊載入失敗的防護】
                audio.onerror = () => {
                    console.error("音樂載入失敗！請確認檔名是否正確。");
                    isAudioLoaded = false;
                    playBtn.disabled = true;
                    stopBtn.disabled = true;
                    playBtn.innerText = "ERROR";
                    statusText.innerText = "音樂載入失敗";
                    statusText.style.display = 'block';
                };

                // 當音訊可以播放時才解鎖按鈕
                audio.oncanplay = () => {
                    isAudioLoaded = true;
                    playBtn.disabled = false;
                    stopBtn.disabled = false;
                };

            } else {
                statusText.innerText = "無效的 ID";
                errorMsg.style.display = 'block';
            }

            playBtn.addEventListener('click', () => {
                audio.play().then(() => {
                    cover.style.animationPlayState = 'running';
                }).catch(error => {
                    console.error("播放失敗", error);
                });
            });

            stopBtn.addEventListener('click', () => {
                audio.pause();
                cover.style.animationPlayState = 'paused';
            });
            
            audio.addEventListener('ended', () => {
                cover.style.animationPlayState = 'paused';
            });
        });
    </script>
</body>
</html>
