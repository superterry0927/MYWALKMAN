<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>專屬隨身聽</title>
    <style>
        /* =========================================
           視覺設計 (CSS) 
           ========================================= */
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #2b2b2b; 
            margin: 0; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            /* 預防手機選取文字反白 */
            user-select: none;
            -webkit-user-select: none;
        }
        
        .walkman-body { 
            background: linear-gradient(145deg, #e6e6e6, #c0c0c0); 
            width: 320px; 
            padding: 30px 20px; 
            border-radius: 20px; 
            box-shadow: 10px 10px 20px #1a1a1a, inset -2px -2px 6px #999, inset 2px 2px 6px #fff; 
            border: 2px solid #a3a3a3; 
        }

        .brand-text {
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            color: #555;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        
        .tape-window { 
            background-color: #111; 
            height: 180px; 
            border-radius: 12px; 
            margin-bottom: 30px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            border: 4px solid #444; 
            box-shadow: inset 0 0 15px #000; 
            position: relative;
        }

        /* 讀取中的提示文字 */
        .loading-text {
            position: absolute;
            color: #888;
            font-size: 14px;
            z-index: 1;
        }
        
        .cover-art { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            object-fit: cover; 
            animation: spin 4s linear infinite; 
            animation-play-state: paused; 
            z-index: 2;
            display: none; /* 預設隱藏，讀取成功後顯示 */
            border: 2px solid #333;
        }
        
        .controls { 
            display: flex; 
            justify-content: space-between; 
            padding: 0 10px;
        }
        
        button { 
            width: 45%; 
            height: 50px; 
            border-radius: 8px; 
            border: none; 
            font-weight: 900; 
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer; 
            box-shadow: 0px 5px 0px #888, 2px 8px 10px rgba(0,0,0,0.3); 
            transition: transform 0.1s, box-shadow 0.1s; 
            outline: none;
        }
        
        button:active { 
            transform: translateY(5px); 
            box-shadow: 0px 0px 0px #888, 1px 3px 5px rgba(0,0,0,0.3); 
        }

        button:disabled {
            background-color: #ccc !important;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0px 5px 0px #888;
        }
        
        #play-btn { background-color: #ff471a; color: white; }
        #stop-btn { background-color: #555; color: white; }
        
        @keyframes spin { 
            100% { transform: rotate(360deg); } 
        }

        /* 錯誤訊息樣式 */
        #error-msg {
            color: #ff471a;
            text-align: center;
            font-size: 14px;
            margin-top: 20px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div class="walkman-body">
        <div class="brand-text">STEREO CASSETTE PLAYER</div>
        
        <div class="tape-window">
            <div class="loading-text" id="status-text">載入中...</div>
            <!-- 封面圖片 -->
            <img src="" alt="Cover Art" class="cover-art" id="cover">
        </div>
        
        <div class="controls">
            <!-- 音樂播放器 (隱藏) -->
            <audio id="audio-player"></audio>
            
            <button id="play-btn" disabled>PLAY</button>
            <button id="stop-btn" disabled>STOP</button>
        </div>

        <div id="error-msg">找不到對應的音樂資料，請確認卡片網址。</div>
    </div>

    <script>
        /* =========================================
     
           ========================================= */
        // 使用者對應表：左邊的數字對應網址的 ?id=數字
        // 將 "你的圖片直連網址" 與 "你的音樂直連網址" 替換掉
        const mediaDatabase = {
            "1": {
                coverUrl: "https://drive.google.com/uc?export=view&id=1fpHSTHIUSMrDnKwrs2k37qn9EczGNMZh", // 範例圖
                audioUrl: "https://drive.google.com/uc?export=view&id=1uDujXqzrzsuj3Qqiw0RMCDjfeckIe2Ib"   // 範例音訊
            },
            "2": {
                coverUrl: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=300", // 範例圖
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"   // 範例音訊
            },
            // 你可以繼續往下複製新增 "3", "4"... 到 "10"
            "3": {
                coverUrl: "", 
                audioUrl: ""
            }
        };

        /* =========================================
           互動邏輯區 (無需修改)
           ========================================= */
        document.addEventListener('DOMContentLoaded', () => {
            // 取得網址列上的 ?id=參數 (如果沒有，預設給 '1')
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id') || '1'; 

            const audio = document.getElementById('audio-player');
            const cover = document.getElementById('cover');
            const playBtn = document.getElementById('play-btn');
            const stopBtn = document.getElementById('stop-btn');
            const statusText = document.getElementById('status-text');
            const errorMsg = document.getElementById('error-msg');

            // 檢查資料庫是否有這個使用者的資料
            if (mediaDatabase[userId] && mediaDatabase[userId].audioUrl !== "") {
                const userData = mediaDatabase[userId];
                
                // 設定圖片與音樂來源
                cover.src = userData.coverUrl;
                audio.src = userData.audioUrl;

                // 當圖片載入完成時
                cover.onload = () => {
                    cover.style.display = 'block';
                    statusText.style.display = 'none';
                    playBtn.disabled = false;
                    stopBtn.disabled = false;
                };

            } else {
                // 找不到資料的錯誤處理
                statusText.innerText = "無效的 ID";
                errorMsg.style.display = 'block';
            }

            // --- 播放控制邏輯 ---
            playBtn.addEventListener('click', () => {
                // 嘗試播放音樂
                audio.play().then(() => {
                    cover.style.animationPlayState = 'running';
                }).catch(error => {
                    console.error("播放失敗可能原因：瀏覽器阻擋或網址失效", error);
                    alert("無法播放音樂，請檢查您的網路或連結是否有效。");
                });
            });

            stopBtn.addEventListener('click', () => {
                audio.pause();
                cover.style.animationPlayState = 'paused';
            });
            
            // 音樂播完時停止旋轉
            audio.addEventListener('ended', () => {
                cover.style.animationPlayState = 'paused';
            });
        });
    </script>
</body>
</html>
